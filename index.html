<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ip-address-tracker-with-leafletjs</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <header>
      <h1>IP Address Tracker</h1>
      <form class="ip-search" id="search-form">
        <input
          id="search-input"
          type="search"
          placeholder="Search for any Ip Address or Domain"
        />
        <button type="submit">
          <img src="src/assets/images/icon-arrow.svg" alt="" />
        </button>
      </form>
      <section class="tracker-card">
        <article class="tracker-card__item">
          <h2>IP Address</h2>
          <p id="ip-address">-</p>
        </article>

        <article class="tracker-card__item">
          <h2>Location</h2>
          <p id="location">-</p>
        </article>

        <article class="tracker-card__item">
          <h2>Timezone</h2>
          <p id="timezone">-</p>
        </article>

        <article class="tracker-card__item">
          <h2>ISP</h2>
          <p id="isp">-</p>
        </article>
      </section>
    </header>
    <main>
      <div id="map"></div>
    </main>
    <footer></footer>
    <script type="module" src="/src/assets/js/main.js"></script>
  </body>
</html>
